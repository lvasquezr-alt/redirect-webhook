<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Redirección</title>
    <script>
        const params = new URLSearchParams(window.location.search);
        const peticion = params.get("Peticion");

        if (peticion) {
            fetch("https://luisfer-desarrollador.app.n8n.cloud/webhook/query-string/?Peticion=" + peticion)
                .catch(() => {});
        }

        setTimeout(() => {
            window.location.href = "https://www.pucp.edu.pe";
        }, 1000);
    </script>
</head>
<body>
    <p>Redirigiendo...</p>
</body>
</html>
